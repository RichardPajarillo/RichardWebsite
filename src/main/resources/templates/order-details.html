<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Order Details</title>
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">

  <h2>Order Details</h2>

  <p>Order ID: <span th:text="${order.userOrderNumber}"></span></p>
  <p>Total: $<span th:text="${order.total}"></span></p>

  <table border="1" style="width: 100%; margin-top: 20px;">
    <thead>
    <tr>
      <th>Book</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Subtotal</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="item : ${order.items}">
      <td th:text="${item.bookTitle}"></td>
      <td th:text="${item.price}"></td>
      <td th:text="${item.quantity}"></td>
      <td th:text="${item.price * item.quantity}"></td>
    </tr>
    </tbody>
  </table>

  <br>
  <a th:href="@{/orders}" class="nav-btn">Back to Orders</a>

</div>

</body>
</html>
