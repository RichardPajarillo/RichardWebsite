<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Checkout</title>
  <link th:href="@{/css/style.css}" rel="stylesheet">

</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
  <h2>Order Summary</h2>
  <p class="auth-subtitle">Please confirm your items before placing the order.</p>

  <div th:replace="~{fragments/pagination :: pager(pageObj=${itemPage}, baseUrl=${baseUrl}, anchor='')}"></div>
  <br>
  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>Book Title</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${itemPage.content}">
        <td th:text="${item.book.title}" style="font-weight: 500;"></td>
        <td th:text="${'₱' + #numbers.formatDecimal(item.book.price, 1, 2)}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${'₱' + #numbers.formatDecimal(item.book.price * item.quantity, 1, 2)}"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <div style="margin-top: 30px; text-align: right;">
    <h3 style="margin-bottom: 20px;">Total Amount: <span class="card-price" th:text="${'₱' + #numbers.formatDecimal(cart.total, 1, 2)}"></span></h3>

    <div style="display: flex; gap: 15px; justify-content: flex-end; align-items: stretch;">

      <!-- It might be ugly but forcing their height to 42px makes them equal since you bypass the browser's
      different internal calculations for links vs. buttons.-->

      <a th:href="@{/cart}" class="btn"
         style="text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            height: 42px;
            margin: 0;">
        Cancel Order
      </a>

      <form th:action="@{/checkout}" method="post" style="margin: 0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn"
                style="background: var(--text);
                   color: white;
                   height: 42px;
                   box-sizing: border-box;
                   display: flex;
                   align-items: center;
                   justify-content: center;
                   width: 100%;">
          Confirm & Place Order
        </button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
