<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>Manage Books</title>
  <meta charset="UTF-8" />
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">

  <h2>Manage Books</h2>

  <a th:href="@{/showNewBookForm}" class="btn" style="margin-bottom: 15px; margin-top: 15px; display:inline-block;">
    Add New Book
  </a>

  <div class="table-wrapper">

    <table>

      <thead>
      <tr>
        <th>ID</th>
        <th>Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>

        <td>
          <img th:src="${book.cover}" class="book-cover-sm" alt="Cover">
        </td>

        <td th:text="${book.title}" style="font-weight: 500;"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.genre}"></td>
        <td th:text="${'₱' + #numbers.formatDecimal(book.price, 1, 2)}"></td>

        <td>
          <div class="actions-cell">

            <a th:href="@{/showFormForUpdate/{id}(id=${book.id})}"
               class="btn small-btn">
              Update
            </a>

            <form th:action="@{/deleteBook/{id}(id=${book.id})}" method="post" style="margin:0;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" class="btn small-btn danger-btn">
                Delete
              </button>
            </form>

          </div>
        </td>
      </tr>
      </tbody>

    </table>

  </div>

</div>

</body>
</html>
