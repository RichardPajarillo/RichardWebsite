<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Manage Books | Admin</title>
  <meta charset="UTF-8" />
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
  <h2>Manage Books</h2>
  <a th:href="@{/admin/books/new}" class="btn" style="margin: 20px 0; display:inline-block;">
    + Add New Book
  </a>



  <a th:href="@{/admin/dashboard}" class="btn small-btn" style="margin-bottom: 15px; display: inline-block;">
    Back to Dashboard
  </a>

  <form method="get" th:action="@{/admin/books}"
        style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">

    <input type="text"
           name="search"
           th:value="${search}"
           placeholder="Search title..."
           style="padding: 6px 10px;" />

    <select name="genre">
      <option value="">All Genres</option>
      <option value="Fantasy" th:selected="${genre == 'Fantasy'}">Fantasy</option>
      <option value="Romance" th:selected="${genre == 'Romance'}">Romance</option>
      <option value="Horror" th:selected="${genre == 'Horror'}">Horror</option>
      <option value="Mystery" th:selected="${genre == 'Mystery'}">Mystery</option>
      <option value="Sci-Fi" th:selected="${genre == 'Sci-Fi'}">Sci-Fi</option>
      <option value="Non-Fiction" th:selected="${genre == 'Non-Fiction'}">Non-Fiction</option>
    </select>

    <button type="submit" class="btn small-btn">Search</button>

    <a th:href="@{/admin/books}"
       th:if="${search != null or genre != null}">
      Clear
    </a>

  </form>

  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>DB ID</th>
        <th>Book ID</th>
        <th>Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="book, iterStat : ${books}">
        <td th:text="${book.id}"></td>

        <td th:text="'#' + ${(bookPage.number * bookPage.size) + iterStat.count}"
            style="color: var(--muted); font-family: monospace; font-weight: 600;">
        </td>

        <td>
          <img th:src="${book.cover}" class="book-cover-sm" alt="Cover">
        </td>

        <td th:text="${book.title}" style="font-weight: 500;"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.genre}"></td>
        <td th:text="${'₱' + #numbers.formatDecimal(book.price, 1, 2)}"></td>

        <td>
          <div class="actions-cell">
            <a th:href="@{/admin/books/update/{id}(id=${book.id})}" class="btn small-btn">Update</a>

            <form th:action="@{/admin/books/delete/{id}(id=${book.id})}" method="post">
              <button type="submit" class="btn small-btn danger-btn"
                      onclick="return confirm('Delete this book?')">Delete</button>
            </form>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
  <div th:replace="~{fragments/pagination :: pager(pageObj=${bookPage}, baseUrl=${baseUrl}, anchor='')}"></div>
</div>

</body>
</html>
