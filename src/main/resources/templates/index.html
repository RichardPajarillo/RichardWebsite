<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Spring Boot Styled Page</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/cardstyle.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="hero">
    <div class="hero-content">
    <h1>Our Book Collection</h1>
    <p>Explore different formula connections and broaden new perspectives.</p>
        <a href="#collection" class="hero-btn">Explore Bookstore</a>
    </div>
</div>

<div class="content-wrapper">
    <h2 id="collection">Book Directory</h2>
    <br>
    <form method="get" action="/#collection" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
        <input type="text" name="search" th:value="${search}" placeholder="Search titles..."
               style="padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); outline: none; width: 200px;" />

        <select name="genre" onchange="this.form.submit()"
                style="padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: white; cursor: pointer;">
            <option value="">All Genres</option>
            <option value="Fantasy" th:selected="${genre == 'Fantasy'}">Fantasy</option>
            <option value="Humor" th:selected="${genre == 'Humor'}">Humor</option>
            <option value="Romance" th:selected="${genre == 'Romance'}">Romance</option>
            <option value="Horror" th:selected="${genre == 'Horror'}">Horror</option>
            <option value="Mystery" th:selected="${genre == 'Mystery'}">Mystery</option>
            <option value="Sci-Fi" th:selected="${genre == 'Sci-Fi'}">Sci-Fi</option>
            <option value="Non-Fiction" th:selected="${genre == 'Non-Fiction'}">Non-Fiction</option>
        </select>

        <button type="submit" class="btn small-btn" style="background: var(--text); color: white; border-radius: 20px;">Search</button>

        <a th:href="@{/#collection}" th:if="${search != null or genre != null}"
           style="font-size: 13px; color: var(--muted); text-decoration: none; margin-left: 5px;">Clear All</a>
    </form>
    <br>

    <div class="orders-container">
        <div class="book-card" th:each="book : ${bookPage.content}">
            <div class="card-image-link"
                 style="cursor: pointer;"
                 th:data-id="${book.id}"
                 th:data-title="${book.title}"
                 th:data-author="${book.author}"
                 th:data-genre="${book.genre}"
                 th:data-price="${book.price}"
                 th:data-about="${book.about}"
                 th:data-cover="${book.cover}"
                 onclick="openModal(this)">

                <img th:src="${book.cover}" class="card-img" alt="Book Cover">

                <div class="card-overlay">
                    <span style="color: white; font-weight: 600;">View Details</span>
                </div>
            </div>
            <div class="card-content">
                <p class="card-genre" th:text="${book.genre}"></p>
                <h3 class="card-title" th:text="${book.title}"></h3>
                <p class="card-author" th:text="${'by ' + book.author}"></p>
            </div>
            <div class="card-footer" style="border-top: 1px solid var(--border); background: #fafafa; padding: 20px;">
                <div>
                    <p style="font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 0;">Price</p>
                    <span class="card-price" th:text="${'₱' + #numbers.formatDecimal(book.price, 1, 2)}"></span>
                </div>
                <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post" style="margin:0;">
                    <button type="submit" class="btn small-btn" style="background: var(--text); color: white;">+ Cart</button>
                </form>
            </div>
        </div>

        <div id="bookModal" class="modal-overlay" onclick="closeModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <div class="modal-grid">
                    <div class="modal-left">
                        <img id="modalImg" src="" alt="Cover" />
                    </div>
                    <div class="modal-right">
                        <h2 id="modalTitle"></h2>
                        <p class="modal-meta"><strong id="modalAuthor"></strong> | <span id="modalGenre"></span></p>
                        <hr />
                        <p id="modalAbout"></p>
                        <div class="modal-footer">
                            <span id="modalPrice" class="card-price"></span>
                        </div>
                        <br>
                        <form id="modalAddToCartForm" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn small-btn">Add to Cart</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pager(${bookPage}, '/', '#collection')}"></div>
</div>

</body>

<script>
    function openModal(element) {
    // 1. Get the ID and other data
    const bookId = element.getAttribute('data-id');
    const title = element.getAttribute('data-title');
    const author = element.getAttribute('data-author');
    const genre = element.getAttribute('data-genre');
    const price = element.getAttribute('data-price');
    const about = element.getAttribute('data-about');
    const cover = element.getAttribute('data-cover');

    // 2. Populate text and images
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalAuthor').innerText = 'by ' + author;
    document.getElementById('modalGenre').innerText = genre;
    document.getElementById('modalPrice').textContent = '₱' + parseFloat(price).toFixed(2);
    document.getElementById('modalAbout').innerText = about;
    document.getElementById('modalImg').src = cover;

    // 3. DYNAMICALLY SET THE FORM ACTION
    // This points the form to /cart/add/ID_OF_BOOK
    const form = document.getElementById('modalAddToCartForm');
    form.action = '/cart/add/' + bookId;

    // 4. Display the modal
    document.getElementById('bookModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

    function closeModal(event) {
    // If event exists, we check if the user clicked the overlay itself
    if (event && event.target !== document.getElementById('bookModal') && event.target.className !== 'close-btn') {
        return;
    }
    document.getElementById('bookModal').style.display = 'none';
    document.body.style.overflow = 'auto';
    }
</script>
</html>
