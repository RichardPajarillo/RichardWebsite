<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Spring Boot Styled Page</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/cardstyle.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="hero">
    <h1>Our Book Collection</h1>
    <p>Explore different collections and discover new perspectives.</p>
</div>

<div class="content-wrapper">

    <h2>Book Directory</h2>

    <!-- SEARCH / FILTER FORM -->
    <form method="get" action="/" style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">

        <input type="text" name="search" placeholder="Search book title..." />

        <select name="genre">
            <option value="">All Genres</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
        </select>

        <button type="submit" class="nav">Filter</button>

        <a th:href="@{/}" class="nav">Reset</a>

    </form>


    <!-- TABLE WRAPPER FOR MOBILE SCROLL -->
    <!-- BOOK CARDS -->
    <div class="orders-container">

        <div class="order-card" th:each="book : ${listBooks}">

            <div class="order-header">
                <span class="item-title" th:text="${book.title}"></span>
                <span class="order-total" th:text="${book.price}"></span>
            </div>

            <div class="order-body">

                <img th:src="${book.cover}" style="width:100%; border-radius:8px; margin-bottom:10px;" />

                <div class="order-item">
                    <span class="item-details">Author</span>
                    <span class="item-title" th:text="${book.author}"></span>
                </div>

                <div class="order-item">
                    <span class="item-details">Genre</span>
                    <span class="item-title" th:text="${book.genre}"></span>
                </div>

                <div class="order-item">
                    <span class="item-details">About</span>
                    <span class="item-subtotal" th:text="${book.about}"></span>
                </div>

            </div>

            <div class="order-footer action-cell">

                <!-- ADD TO CART -->
                <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button type="submit" class="btn">
                        Add to Cart
                    </button>

                </form>

            </div>

        </div>

    </div>

    <div class="pagination">

        <a th:if="${currentPage > 0}"
           th:href="@{/(page=${currentPage - 1}, search=${search}, genre=${genre})}">
            Previous
        </a>

        <span>
        Page <span th:text="${currentPage + 1}"></span>
        of <span th:text="${totalPages}"></span>
    </span>

        <a th:if="${currentPage + 1 < totalPages}"
           th:href="@{/(page=${currentPage + 1}, search=${search}, genre=${genre})}">
            Next
        </a>

    </div>

</div>

</body>
</html>
