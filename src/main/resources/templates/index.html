<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Spring Boot Styled Page</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">

    <h2 th:text="${message}">Default Message</h2>

    <p sec:authorize="isAuthenticated()">
        👋 Welcome, <span sec:authentication="name"></span>
    </p>

    <p sec:authorize="isAnonymous()">
        You are not logged in
    </p>

    <p sec:authorize="isAuthenticated()">
        Role: <span sec:authentication="principal.authorities"></span>
    </p>

</div>

<div class="content-wrapper">

    <h2>Book Directory</h2>


    <form method="get" action="/">

        <input type="text" name="search" placeholder="Search book title..." />

        <select name="genre">
            <option value="">All Genres</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
        </select>

        <button type="submit" class="nav-btn">Filter</button>
    </form>

    <a th:href="@{/}" class="nav-btn">Reset</a>

    <!-- 👑 ADMIN ONLY: Add Book -->
    <a th:href="@{/showNewBookForm}"
       class="nav-btn"
       style="background-color: #28a745; margin-bottom: 10px; display: inline-block;"
       sec:authorize="hasRole('ADMIN')">
        Add New Book
    </a>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">

        <thead>
        <tr>
            <th>Cover</th>
            <th>Title</th>
            <th>Author</th>
            <th>About</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="book : ${listBooks}">

            <td>
                <img th:src="${book.cover}" style="width:80px;" />
            </td>

            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.genre}"></td>
            <td th:text="${book.about}"></td>
            <td th:text="${book.price}"></td>

            <td>

                <!-- 🛒 ALL USERS: Add to Cart -->
                <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button type="submit"
                            class="nav-btn"
                            style="padding: 5px; font-size: 12px;">
                        Add to Cart
                    </button>
                </form>

                <!-- 👑 ADMIN ONLY: Update -->
                <a th:href="@{/showFormForUpdate/{id}(id=${book.id})}"
                   class="nav-btn"
                   style="padding: 5px; font-size: 12px;"
                   sec:authorize="hasRole('ADMIN')">
                    Update
                </a>

                <!-- 👑 ADMIN ONLY: Delete -->
                <form th:action="@{/deleteBook/{id}(id=${book.id})}"
                      method="post"
                      style="display:inline;"
                      sec:authorize="hasRole('ADMIN')">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button type="submit"
                            class="nav-btn"
                            style="padding: 5px; font-size: 12px; background-color: #dc3545;">
                        Delete
                    </button>

                </form>

            </td>
        </tr>

        </tbody>
    </table>
</div>

<script>
    function togglePopup() {
        var popup = document.getElementById("myPopup");
        popup.classList.toggle("show");
    }
</script>

</body>
</html>
