<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | Formula Book</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="auth-page">
<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to manage your collection.</p>

        <div th:if="${param.error}" class="error-banner">
            Invalid username/password or access!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            <span>Don't have an account?</span>
            <a href="/register">Register</a>
        </div>
    </div>
</div>
</body>
</html>
