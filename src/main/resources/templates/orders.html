<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/cardstyle.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">

    <h2>My Order History</h2>

    <div class="orders-container">

        <!-- 🔁 LOOP ORDERS -->
        <div class="order-card" th:each="order : ${orders}">

            <div class="order-header">
                <div>
                    <span class="order-label">Order #</span>
                    <span class="order-number" th:text="${order.userOrderNumber}"></span>

                    <span style="margin-left: 10px; font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #eee;"
                          th:text="${order.status}">
        </span>
                </div>


            </div>

            <div class="order-body">

                <!-- ✅ SHOW FIRST 3 ITEMS -->
                <div class="order-item"
                     th:each="item, iterStat : ${order.items}"
                     th:if="${iterStat.index < 3}">
                    <p>Book: </p>
                    <div class="item-title" th:text="${item.bookTitle}"></div>

                    <div class="item-details">
                        ₱<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                        ×
                        <span th:text="${item.quantity}"></span>
                    </div>

                    <div class="item-subtotal">
                        <p>Item Subtotal: </p>
                        ₱<span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></span>
                    </div>

                    <span class="order-total">
                        <p>Total: </p>
                        <span th:text="${#numbers.formatDecimal(order.total,1,2)}"></span>
                    </span>

                </div>

                <!-- ✅ SHOW REMAINING COUNT -->
                <div th:if="${order.items.size() > 3}"
                     style="font-size: 13px; color: #888; margin-top: 5px;">

                    +<span th:text="${order.items.size() - 3}"></span> more items...

                </div>

            </div>

            <div class="order-footer">
                <a th:href="@{/orders/{id}(id=${order.id})}" class="nav-btn">
                    View Details
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
