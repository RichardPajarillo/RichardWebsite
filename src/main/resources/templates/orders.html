<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders | Bookstore</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/cardstyle.css}" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
    <h2>My Order History</h2>
    <p class="auth-subtitle">Track and review your previous purchases</p>

    <div class="orders-container">

        <div class="book-card" th:each="order : ${orders}" style="height: auto; padding-bottom: 0;">

            <div class="card-content">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <h3 class="card-title">Order #<span th:text="${order.userOrderNumber}"></span></h3>
                    <span class="card-genre"
                          th:text="${order.status}"
                          style="background: #eef2ff; color: #4338ca;">
                    </span>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;" />

                <div class="order-items-preview">
                    <div th:each="item, iterStat : ${order.items}" th:if="${iterStat.index < 3}"
                         style="margin-bottom: 8px; font-size: 14px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span style="font-weight: 500; color: var(--text);" th:text="${item.bookTitle}"></span>
                            <span style="color: var(--muted);">
                                <span th:text="${item.quantity}"></span> × ₱<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                            </span>
                        </div>
                    </div>

                    <p th:if="${order.items.size() > 3}"
                       style="font-size: 12px; color: var(--muted); font-style: italic; margin-top: 5px;">
                        +<span th:text="${order.items.size() - 3}"></span> more items...
                    </p>
                </div>
            </div>


            <div class="card-footer" style="border-top: 1px solid var(--border); margin-top: 20px; background: #fafafa;">
                <div style = "margin-top: 20px;">
                    <p style="font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 0;">Total Amount</p>
                    <span class="card-price">₱<span th:text="${#numbers.formatDecimal(order.total, 1, 2)}"></span></span>
                </div>

                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn small-btn">
                    Details
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
