<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body class="auth-page">
<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join us for the greater book!</p>

        <div th:if="${param.error}" class="error-banner">
            Username is already taken. Please choose another one.
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="input-group">
                <label>Username *</label>
                <input type="text" th:field="*{username}" placeholder="Username must be between 3-50 characters long" required>
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error-text" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 5px;"></p>
            </div>

            <div class="input-group">
                <label>Password *</label>
                <input type="password" th:field="*{password}" placeholder="Password must be at least 3-50 characters long" required>
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-text" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 5px;"></p>
            </div>

            <div class="input-group">
                <label>Account Type *</label>
                <select th:field="*{role}" required>
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <button type="submit" class="btn auth-btn">Register</button>
        </form>

        <div class="auth-footer">
            <span>Already have an account?</span>
            <a href="/login">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
