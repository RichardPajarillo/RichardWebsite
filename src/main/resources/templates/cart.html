<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Styled Page</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">

    <h2 th:text="${message}">Default Message</h2>

</div>

<div class="content-wrapper">

    <h2>Cart Items</h2>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
        <tr>
            <th>Cover</th>
            <th>Title</th>
            <th>Author</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <!-- ✅ SINGLE LOOP ONLY -->
        <tr th:each="item : ${cart.items}">

            <td>
                <img th:src="${item.book.cover}" style="width:80px;" />
            </td>

            <td th:text="${item.book.title}"></td>

            <td th:text="${item.book.author}"></td>

            <td th:text="${item.quantity}"></td>

            <td th:text="${item.book.price}"
                th:attr="data-price=${item.book.price}">
            </td>

            <td>
                <button onclick="updateQty(this, -1)">-</button>

                <input type="number"
                       class="qty"
                       th:value="${item.quantity}"
                       min="1" />

                <button onclick="updateQty(this, 1)">+</button>

                <input type="hidden"
                       class="bookId"
                       th:value="${item.book.id}" />
            </td>

            <td class="subtotal"
                th:text="${item.book.price * item.quantity}">
            </td>

            <td>
                <a th:href="@{/cart/remove/{id}(id=${item.book.id})}"
                   class="nav-btn"
                   style="padding:5px;">
                    Remove
                </a>
            </td>

        </tr>

        </tbody>
    </table>

    <form th:action="@{/cart/checkout}" method="get">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />
        <button class="nav-btn">Checkout</button>
    </form>

    <h3>
        Total: ₱
        <span id="totalPrice"
              th:text="${#numbers.formatDecimal(T(java.lang.Math).round(cart.total * 100.0) / 100.0, 1, 2)}">
        </span>
    </h3>

</div>

<script>
    function togglePopup() {
        var popup = document.getElementById("myPopup");
        popup.classList.toggle("show");
    }
</script>

<script>
    function updateQty(btn, change) {

        const row = btn.closest("tr");

        const input = row.querySelector(".qty");
        let qty = parseInt(input.value);

        qty = Math.max(1, qty + change);
        input.value = qty;

        const bookId = row.querySelector(".bookId").value;

        const price = parseFloat(
            row.querySelector("[data-price]").dataset.price
        ) || 0;

        // update subtotal instantly
        row.querySelector(".subtotal").innerText =
            (qty * price).toFixed(2);

        // send update
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        fetch("/cart/update", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                [csrfHeader]: csrfToken
            },
            body: `bookId=${bookId}&qty=${qty}`
        })
        .then(r => r.text())
        .then(total => {
            document.getElementById("totalPrice").innerText =
                parseFloat(total).toFixed(2);
        });
    }
</script>

</body>
</html>
