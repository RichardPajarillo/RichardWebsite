<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Styled Page</title>
    <meta charset="UTF-8" />
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/cardstyle.css}" rel="stylesheet">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>

<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
    <h2>Your Shopping Cart</h2>
    <br>

    <div th:if="${param.error != null and param.error[0] == 'empty'}"
         class="error-banner"
         style="margin-bottom: 20px; text-align: center;">
        You have an empty cart! You cannot order without any items.
    </div>

    <div th:if="${#lists.isEmpty(cart.items)}" class="auth-subtitle">
        Your cart is currently empty.
    </div>

    <div class="table-wrapper" th:if="${!#lists.isEmpty(cart.items)}">
        <table>
            <thead>
            <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th style="text-align: center;">Quantity</th>
                <th>Subtotal</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td>
                    <img th:src="${item.book.cover}" class="book-cover-sm" alt="Cover" />
                </td>
                <td th:text="${item.book.title}" style="font-weight: 500;"></td>
                <td th:text="${item.book.author}"></td>
                <td th:text="${'₱' + #numbers.formatDecimal(item.book.price, 1, 2)}"
                    th:attr="data-price=${item.book.price}">
                </td>
                <td>
                    <div class="qty-controls">
                        <button type="button" class="btn small-btn" onclick="updateQty(this, -1)">-</button>
                        <input type="number" class="qty-input" th:value="${item.quantity}" min="1" readonly />
                        <button type="button" class="btn small-btn" onclick="updateQty(this, 1)">+</button>
                        <input type="hidden" class="bookId" th:value="${item.book.id}" />
                    </div>
                </td>
                <td class="subtotal" th:text="${'₱' + #numbers.formatDecimal(item.book.price * item.quantity, 1, 2)}"></td>
                <td>
                    <a th:href="@{/cart/remove/{id}(id=${item.book.id})}" class="btn small-btn danger-btn">
                        Remove
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
        <h3>Total: <span class="card-price" id="totalPrice"
                         th:text="${'₱' + #numbers.formatDecimal(cart.total, 1, 2)}"></span></h3>

        <form th:action="@{/cart/checkout}" method="get">
            <button class="btn" style="background: var(--text); color: white;">Proceed to Checkout</button>
        </form>
    </div>
</div>

<script>
    function togglePopup() {
        var popup = document.getElementById("myPopup");
        popup.classList.toggle("show");
    }
</script>

<script>
    function updateQty(btn, change) {
    const row = btn.closest("tr");

    // 1. MATCH THE CLASS NAME: .qty-input instead of .qty
    const input = row.querySelector(".qty-input");
    let qty = parseInt(input.value);

    qty = Math.max(1, qty + change);
    input.value = qty;

    const bookId = row.querySelector(".bookId").value;

    const price = parseFloat(
        row.querySelector("[data-price]").dataset.price
    ) || 0;

    // 2. UPDATE SUBTOTAL (Adding ₱ back for visual consistency)
    row.querySelector(".subtotal").innerText =
        '₱' + (qty * price).toFixed(2);

    // send update
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    fetch("/cart/update", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            [csrfHeader]: csrfToken
        },
        body: `bookId=${bookId}&qty=${qty}`
    })
    .then(r => r.text())
    .then(total => {
        // 3. UPDATE TOTAL (Adding ₱ back)
        document.getElementById("totalPrice").innerText =
            '₱' + parseFloat(total).toFixed(2);
    });
}
</script>

</body>
</html>
