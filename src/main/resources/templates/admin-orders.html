<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Orders</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
    <h2>All Orders (Admin)</h2>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Order ID</th>
                <th>User's Order ID</th>
                <th>User</th>
                <th>Order Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}" th:id="'order-row-' + ${order.id}">
                <td th:text="'#' + ${order.id}"></td>
                <td><span class="order-number" th:text="${order.userOrderNumber}"></span></td>
                <td th:text="${order.user != null ? order.user.username : 'Unknown'}"></td>
                <td>
                    <div th:each="item : ${order.items}">
                        <strong th:text="${item.bookTitle}"></strong> (x[[${item.quantity}]])
                    </div>
                </td>
                <td><strong th:text="'₱' + ${order.total}"></strong></td>

                <td>
                    <form class="status-form" th:action="@{/admin/orders/updateStatus}" method="post" style="display: flex; gap: 5px;">
                        <input type="hidden" name="orderId" th:value="${order.id}" />

                        <select name="newStatus" class="btn small-btn" style="padding: 2px 5px;">
                            <option th:each="statusOpt : ${T(org.example.richardwebsite.model.OrderStatus).values()}"
                                    th:value="${statusOpt}"
                                    th:text="${statusOpt}"
                                    th:selected="${statusOpt == order.status}">
                            </option>
                        </select>
                        <button type="submit" class="btn small-btn" style="background: #eee;">Update</button>
                    </form>
                </td>

                <td>
                    <div class="actions-cell" style="display: flex; gap: 10px;">
                        <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn small-btn">Details</a>

                        <form class="delete-form" th:action="@{/admin/orders/delete/{id}(id=${order.id})}" method="post">
                            <button type="submit" class="btn small-btn danger-btn">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    // Handle Status Updates
    document.querySelectorAll('.status-form').forEach(form => {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const btn = this.querySelector('button');
            const originalText = btn.innerText;

            btn.innerText = "Saving...";

            fetch(this.action, {
                method: 'POST',
                body: new URLSearchParams(formData),
                headers: { [csrfHeader]: csrfToken }
            }).then(response => {
                if (response.ok) {
                    btn.innerText = "Updated!";
                    btn.style.background = "#d4edda";
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.background = "#eee";
                    }, 2000);
                }
            });
        });
    });

    // Handle Deletions
    document.querySelectorAll('.delete-form').forEach(form => {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!confirm('Are you sure you want to delete this order?')) return;

            const row = this.closest('tr');

            fetch(this.action, {
                method: 'POST',
                headers: { [csrfHeader]: csrfToken }
            }).then(response => {
                if (response.ok) {
                    // Smoothly remove the row from the table
                    row.style.transition = "opacity 0.3s";
                    row.style.opacity = "0";
                    setTimeout(() => row.remove(), 300);
                }
            });
        });
    });
</script>

</body>
</html>
