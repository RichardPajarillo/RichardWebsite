<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Manage Users</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: nav-header}"></div>

<div class="content-wrapper">
    <h2>User Management</h2>

    <div th:if="${param.error == 'selfDelete'}" class="error-banner"
         style="background: #fab1a0; color: #d63031; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
        Warning: You cannot delete your own account.
    </div>

    <div th:if="${param.error == 'selfRoleChange'}" class="error-banner"
         style="background: #fab1a0; color: #d63031; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
        Warning: You cannot change your own administrative permissions.
    </div>

    <a th:href="@{/admin/users/add}" class="btn" style="margin: 20px 0; display: inline-block;">
        Add New User
    </a>

    <a th:href="@{/admin/dashboard}" class="btn small-btn" style="margin-bottom: 15px; display: inline-block;">
        Back to Dashboard
    </a>

    <form method="get" th:action="@{/admin/users}"
          style="display:flex; gap:10px; margin-bottom:15px;">

        <input type="text"
               name="search"
               th:value="${search}"
               placeholder="Search username..." />

        <select name="role" onchange="this.form.submit()">
            <option value="">All Roles</option>
            <option value="USER" th:selected="${role == 'USER'}">USER</option>
            <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
        </select>

        <button type="submit">Filter</button>

        <a th:href="@{/admin/users}" class="btn small-btn">Reset</a>
    </form>

    <br>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>DB Id</th>
                <th>Id</th>
                <th>Username</th>
                <th>Current Role</th>
                <th>Modify Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user, iterStat : ${users}">
                <td th:text="${user.id}"></td>

                <td th:text="'#' + ${(userPage.number * userPage.size) + iterStat.count}"
                    style="color: var(--muted); font-family: monospace; font-weight: 600;">
                </td>

                <td th:text="${user.username}" style="font-weight: 500;"></td>
                <td>
                    <span th:text="${user.role}"
                          th:style="${user.role == 'ADMIN' ? 'color: #d63031; font-weight: bold;' : 'color: #0984e3;'}">
                    </span>
                </td>
                <td>
                    <form th:if="${user.username != #authentication.name}"
                          th:action="@{/admin/users/updateRole}" method="post" style="display: flex; gap: 5px;">
                        <input type="hidden" name="userId" th:value="${user.id}" />
                        <select name="newRole" class="btn small-btn" style="padding: 2px 5px;">
                            <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                        </select>
                        <button type="submit" class="btn small-btn" style="background: #eee;">Update</button>
                    </form>

                    <span th:if="${user.username == #authentication.name}" style="color: #636e72; font-size: 12px; font-style: italic;">
                        Role Locked
                    </span>
                </td>
                <td>
                    <form th:if="${user.username != #authentication.name}"
                          th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this user?');">
                        <button type="submit" class="btn small-btn danger-btn">Delete</button>
                    </form>
                    <span th:if="${user.username == #authentication.name}" style="color: #636e72; font-size: 12px; font-style: italic;">
                            (You)
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{fragments/pagination :: pager(pageObj=${userPage}, baseUrl=${baseUrl}, anchor='')}"></div>
</div>

</body>
</html>
